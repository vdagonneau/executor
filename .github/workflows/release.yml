name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Adds build-essential for cgo
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          set -euo pipefail
          make

      - name: Package release assets
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          archive="executor_${tag}_linux_amd64.tar.gz"
          tar -czf "${archive}" executor agent
          sha256sum "${archive}" > "${archive}.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            executor_${{ github.ref_name }}_linux_amd64.tar.gz
            executor_${{ github.ref_name }}_linux_amd64.tar.gz.sha256
